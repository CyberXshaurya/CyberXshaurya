# 🐍 Generates the contribution-grid "snake" animation and pushes it
# to the `output` branch, where the profile README reads it from.
#
# WHERE THIS GOES:
#   In your profile repo  CyberXshaurya/CyberXshaurya
#   create a file at exactly:  .github/workflows/snake.yml
#   and paste this whole file into it.
#
# Runs automatically every 12 hours, and you can also run it by hand
# from the repo's "Actions" tab → "Generate Snake" → "Run workflow".

name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # lets you run it manually
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
